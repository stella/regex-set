name: SBOM

on:
  push:
    branches: [main]
    paths:
      - "bun.lock"
      - "Cargo.lock"
      - "**/package.json"
      - "Cargo.toml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sbom-generation
  cancel-in-progress: true

jobs:
  generate-sbom:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate CycloneDX SBOM
        run: >
          bunx @cyclonedx/cdxgen
          -t javascript
          -t rust
          --no-install-deps
          --required-only
          --json-pretty
          -o sbom.cdx.json
          .

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom-${{ github.sha }}
          path: sbom.cdx.json
          retention-days: 365
