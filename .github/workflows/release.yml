name: Release

env:
  NODE_VERSION: "22"
  CARGO_INCREMENTAL: 0
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing git tag to release, e.g. v1.0.0
        required: true
        type: string
      publish_to_npm:
        description: Publish npm packages after creating the GitHub release
        required: true
        default: false
        type: boolean

concurrency:
  group: release-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify release inputs
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ inputs.tag }}
          fetch-depth: 0

      - name: Validate tag and package versions
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail

          git rev-parse --verify "refs/tags/${RELEASE_TAG}" >/dev/null

          node --input-type=module <<'EOF'
          import fs from "node:fs";
          import path from "node:path";

          const tag = process.env.RELEASE_TAG;
          const expected = tag.replace(/^v/, "");
          const manifests = [
            "package.json",
            ...fs.readdirSync("npm").map((dir) => path.join("npm", dir, "package.json")),
            "wasm/package.json",
          ];

          for (const manifestPath of manifests) {
            const manifest = JSON.parse(fs.readFileSync(manifestPath, "utf8"));
            if (manifest.version !== expected) {
              console.error(
                `${manifestPath} has version ${manifest.version}, expected ${expected}`,
              );
              process.exit(1);
            }
          }

          const root = JSON.parse(fs.readFileSync("package.json", "utf8"));
          for (const [name, version] of Object.entries(root.optionalDependencies ?? {})) {
            if (!name.startsWith("@stll/regex-set-")) {
              continue;
            }
            if (version !== expected) {
              console.error(
                `optionalDependencies.${name} has version ${version}, expected ${expected}`,
              );
              process.exit(1);
            }
          }
          EOF

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
          targets: wasm32-wasip1-threads

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-verify

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: cargo clippy --all-targets --all-features -- -Dwarnings
      - run: cargo fmt -- --check

      - name: License audit
        run: |
          cargo install cargo-deny --locked
          cargo deny check

      - name: Docs
        run: cargo doc --no-deps
        env:
          RUSTDOCFLAGS: -Dwarnings

      - run: cargo test

      - uses: stella/.github/actions/provenance-check@0107276320ff349dda9bcd9e111680cca1951fce
        with:
          provenance-version: v0.1.1

      - run: bun run build
      - run: bun run build:js
      - run: bun run test:runtime:bun
      - run: node scripts/runtime-smoke.mjs

  build:
    name: Build - ${{ matrix.settings.target }}
    needs: [verify]
    runs-on: ${{ matrix.settings.os }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          - target: x86_64-apple-darwin
            os: macos-15
          - target: aarch64-apple-darwin
            os: macos-15
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use-cross: true
          - target: wasm32-wasip1-threads
            os: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ inputs.tag }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-build-${{ matrix.settings.target }}

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - name: Build (native)
        if: >-
          !matrix.settings.use-cross
          && matrix.settings.target != 'wasm32-wasip1-threads'
        run: >
          bun run build
          --target ${{ matrix.settings.target }}

      - name: Build (cross-compile)
        if: ${{ matrix.settings.use-cross }}
        run: >
          bun run build
          --target ${{ matrix.settings.target }}
          --use-napi-cross

      - name: Build (WASM)
        if: matrix.settings.target == 'wasm32-wasip1-threads'
        run: bun run build:wasm

      - uses: actions/upload-artifact@v8
        with:
          name: bindings-${{ matrix.settings.target }}
          path: |
            *.node
            *.wasm
            !*.debug.wasm
          if-no-files-found: error

  test:
    name: Test
    needs: [build]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ inputs.tag }}

      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile

      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Move artifacts
        shell: bash
        run: |
          ls -R artifacts/
          for dir in artifacts/bindings-*; do
            cp -- "$dir"/*.node . 2>/dev/null || true
            cp -- "$dir"/*.wasm . 2>/dev/null || true
          done
          ls -la -- *.node 2>/dev/null || echo "No .node files"
          ls -la -- *.wasm 2>/dev/null || echo "No .wasm files"

      - run: bun test

  publish:
    name: Publish
    needs: [verify, test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ inputs.tag }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org

      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile

      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Prepare npm packages
        run: bun x @napi-rs/cli artifacts

      - name: Build JS/TS entrypoints
        run: bun run build:js

      - name: Pack release tarballs
        id: pack
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-artifacts

          root_json="$(npm pack --json --ignore-scripts --pack-destination release-artifacts)"
          root_file="$(echo "$root_json" | jq -r '.[0].filename')"
          root_tarball="release-artifacts/$root_file"

          while IFS= read -r pkg; do
            (
              cd "$pkg"
              npm pack --json --ignore-scripts --pack-destination "$GITHUB_WORKSPACE/release-artifacts" >/dev/null
            )
          done < <(find npm -mindepth 1 -maxdepth 1 -type d | sort)

          (
            cd wasm
            npm pack --json --ignore-scripts --pack-destination "$GITHUB_WORKSPACE/release-artifacts" >/dev/null
          )

          mapfile -t aux_tarballs < <(find release-artifacts -maxdepth 1 -name '*.tgz' ! -name "$root_file" | sort)

          echo "root_tarball=$root_tarball" >> "$GITHUB_OUTPUT"
          {
            echo 'aux_tarballs<<EOF'
            printf '%s\n' "${aux_tarballs[@]}"
            echo EOF
          } >> "$GITHUB_OUTPUT"

          ls -la release-artifacts

      - name: Generate release checksums
        shell: bash
        run: |
          set -euo pipefail
          (
            cd release-artifacts
            sha256sum *.tgz > SHA256SUMS
          )

      - name: Attest root package tarball with SBOM
        uses: actions/attest@281a49d4cbb0a72c9575a50d18f6deb515a11deb
        with:
          subject-path: ${{ steps.pack.outputs.root_tarball }}
          sbom-path: provenance/sbom.cdx.json

      - name: Attest auxiliary package tarballs
        if: steps.pack.outputs.aux_tarballs != ''
        uses: actions/attest@281a49d4cbb0a72c9575a50d18f6deb515a11deb
        with:
          subject-path: ${{ steps.pack.outputs.aux_tarballs }}

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          assets=(
            release-artifacts/*.tgz
            release-artifacts/SHA256SUMS
            provenance/sbom.cdx.json
            provenance/THIRD-PARTY-NOTICES.txt
            provenance/report.json
          )

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber
          else
            gh release create "$RELEASE_TAG" "${assets[@]}" \
              --verify-tag \
              --generate-notes \
              --title "$RELEASE_TAG"
          fi

      - name: Publish to npm
        if: ${{ inputs.publish_to_npm }}
        run: |
          while IFS= read -r tarball; do
            [[ -n "$tarball" ]] || continue
            npm publish "$tarball" --access public
          done <<< "$AUX_TARBALLS"

          npm publish "$ROOT_TARBALL" --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          AUX_TARBALLS: ${{ steps.pack.outputs.aux_tarballs }}
          ROOT_TARBALL: ${{ steps.pack.outputs.root_tarball }}
