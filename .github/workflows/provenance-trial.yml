name: Provenance Trial

on:
  workflow_dispatch:
    inputs:
      provenance_ref:
        description: Git ref for stella/provenance
        required: false
        default: main
        type: string

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout regex-set
        uses: actions/checkout@v6

      - name: Checkout provenance tool
        uses: actions/checkout@v6
        with:
          repository: stella/provenance
          ref: ${{ inputs.provenance_ref }}
          path: .provenance-tool
          token: ${{ secrets.STELLA_REPO_READ_TOKEN || github.token }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install regex-set dependencies
        run: bun install --frozen-lockfile

      - name: Build provenance binary
        run: cargo install --path .provenance-tool --locked --root .provenance-bin

      - name: Generate provenance artifacts
        run: ./.provenance-bin/bin/provenance generate --root .

      - name: Upload provenance artifacts
        uses: actions/upload-artifact@v7
        with:
          name: provenance-${{ github.sha }}
          path: provenance/
          retention-days: 30
