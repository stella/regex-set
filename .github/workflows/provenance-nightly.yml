name: Provenance Nightly

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  provenance-update:
    permissions:
      contents: write
      pull-requests: write
    uses: stella/.github/.github/workflows/provenance-update.yml@ed5dd1557340fbdd580bf1ffa24103734dc5e74a
    secrets: inherit
    with:
      install-command: bun install --frozen-lockfile
      provenance-version: v0.1.1
