name: CI

env:
  NODE_VERSION: "22"
  CARGO_INCREMENTAL: 0
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    types:
      [
        opened,
        synchronize,
        reopened,
        ready_for_review,
        labeled,
      ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Path filter (skip native builds for non-Rust changes)
  check-changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      rust-changed: ${{ steps.filter.outputs.rust }}
      provenance-changed: ${{ steps.filter.outputs.provenance }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            rust:
              - 'src/**'
              - 'build.rs'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.github/workflows/ci.yml'
            provenance:
              - 'bun.lock'
              - 'Cargo.lock'
              - '**/package.json'
              - 'Cargo.toml'
              - '.provenance.yml'
              - 'provenance/**'
              - '.github/workflows/ci.yml'

  # ── Trust gate (PRs only) ─────────────────────
  trust-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      trusted: ${{ steps.check.outputs.trusted }}
    steps:
      - name: Check if PR is trusted
        id: check
        env:
          HEAD_REPO: >-
            ${{ github.event.pull_request.head.repo.full_name }}
          BASE_REPO: ${{ github.repository }}
        run: |
          if [[ "$HEAD_REPO" == "$BASE_REPO" ]]; then
            echo "trusted=true" >> "$GITHUB_OUTPUT"
          elif [[ '${{ contains(github.event.pull_request.labels.*.name, 'run-ci') }}' == 'true' ]]; then
            echo "trusted=true" >> "$GITHUB_OUTPUT"
          else
            echo "trusted=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Fork PR without 'run-ci' label — CI skipped."
          fi

  # ── Lint (PRs + push) ─────────────────────────
  lint:
    name: Lint
    if: >-
      always()
      && (github.event_name != 'pull_request'
          || needs.trust-check.outputs.trusted == 'true')
    needs: [trust-check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run lint

  # ── Rust checks (PRs + push) ─────────────────
  rust-checks:
    name: Rust checks
    if: >-
      always()
      && needs.check-changes.outputs.rust-changed == 'true'
      && (github.event_name != 'pull_request'
          || needs.trust-check.outputs.trusted == 'true')
    needs: [trust-check, check-changes]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-checks

      - name: Clippy
        run: cargo clippy --all-targets -- -Dwarnings

      - name: Format
        run: cargo fmt -- --check

      - name: License audit
        run: |
          cargo install cargo-deny --locked
          cargo deny check

      - name: Docs
        run: cargo doc --no-deps
        env:
          RUSTDOCFLAGS: -Dwarnings

  # ── Provenance (PRs + push) ───────────────────
  provenance:
    name: Provenance
    if: >-
      always()
      && needs.check-changes.outputs.provenance-changed == 'true'
      && (github.event_name != 'pull_request'
          || needs.trust-check.outputs.trusted == 'true')
    needs: [check-changes, trust-check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - uses: stella/.github/actions/provenance-check@94e70352f5ab42a465f7b03d9ab1bae07b53e4b9
        with:
          provenance-ref: eba1d86

  # ── Build (push to main + tags only) ──────────
  build:
    name: Build - ${{ matrix.settings.target }}
    needs: [check-changes]
    if: >-
      github.event_name != 'pull_request'
      && (startsWith(github.ref, 'refs/tags/v')
          || needs.check-changes.outputs.rust-changed == 'true')
    runs-on: ${{ matrix.settings.os }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          - target: x86_64-apple-darwin
            os: macos-15
          - target: aarch64-apple-darwin
            os: macos-15
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use-cross: true
          - target: wasm32-wasip1-threads
            os: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: build-${{ matrix.settings.target }}

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - name: Build (native)
        if: >-
          !matrix.settings.use-cross
          && matrix.settings.target != 'wasm32-wasip1-threads'
        run: >
          bun run build
          --target ${{ matrix.settings.target }}

      - name: Build (cross-compile)
        if: ${{ matrix.settings.use-cross }}
        run: >
          bun run build
          --target ${{ matrix.settings.target }}
          --use-napi-cross

      - name: Build (WASM)
        if: matrix.settings.target == 'wasm32-wasip1-threads'
        run: bun run build:wasm

      - uses: actions/upload-artifact@v7
        with:
          name: bindings-${{ matrix.settings.target }}
          path: |
            *.node
            *.wasm
            !*.debug.wasm
          if-no-files-found: error

  # ── Test (after build, push only) ─────────────
  test:
    name: Test
    needs: [build]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15]
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile

      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Move artifacts
        shell: bash
        run: |
          ls -R artifacts/
          for dir in artifacts/bindings-*; do
            cp "$dir"/*.node . 2>/dev/null || true
            cp "$dir"/*.wasm . 2>/dev/null || true
          done
          ls -la *.node 2>/dev/null || echo "No .node files"
          ls -la *.wasm 2>/dev/null || echo "No .wasm files"

      - run: bun test

  # ── Publish (tags only) ───────────────────────
  publish:
    name: Publish
    if: >-
      always()
      && startsWith(github.ref, 'refs/tags/v')
      && !contains(needs.*.result, 'failure')
      && !contains(needs.*.result, 'cancelled')
    needs: [test, lint, rust-checks]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org

      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile

      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Prepare npm packages
        run: bun x @napi-rs/cli artifacts

      - name: Build JS/TS entrypoints
        run: bun run build:js

      - name: Publish to npm
        run: |
          npm publish --access restricted
          for pkg in npm/*/; do
            cd "$pkg"
            npm publish --access restricted
            cd ../..
          done
          cd wasm
          npm publish --access restricted
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
