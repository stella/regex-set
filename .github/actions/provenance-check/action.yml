name: "Provenance Check"
description: "Install a pinned stella/provenance release binary and verify committed provenance artifacts"

inputs:
  root:
    description: "Repository root to scan"
    required: false
    default: "."
  node-version:
    description: "Node.js version used to install cdxgen"
    required: false
    default: "22"
  cdxgen-version:
    description: "Pinned @cyclonedx/cdxgen version"
    required: false
    default: "12.1.5"
  install-syft:
    description: "Whether to install Syft for container provenance checks"
    required: false
    default: "false"
  syft-version:
    description: "Pinned Syft release tag"
    required: false
    default: "v1.42.4"
  provenance-version:
    description: "GitHub release tag in stella/provenance to install"
    required: false
    default: "v0.1.1"
  provenance-repository:
    description: "Repository that hosts the provenance CLI"
    required: false
    default: "stella/provenance"
  show-diff-on-failure:
    description: "Whether to print provenance diff output when the check fails"
    required: false
    default: "true"

runs:
  using: "composite"
  steps:
    - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
      with:
        node-version: ${{ inputs.node-version }}

    - name: Install cdxgen
      shell: bash
      env:
        CDXGEN_VERSION: ${{ inputs.cdxgen-version }}
      run: |
        case "$CDXGEN_VERSION" in
          ''|*[!A-Za-z0-9._-]*)
            echo "::error::Invalid cdxgen-version input: $CDXGEN_VERSION"
            exit 1
            ;;
        esac
        npm install --global "@cyclonedx/cdxgen@$CDXGEN_VERSION"

    - id: syft
      if: inputs.install-syft == 'true'
      uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0
      with:
        syft-version: ${{ inputs.syft-version }}

    - name: Install provenance
      shell: bash
      env:
        PROVENANCE_REPOSITORY: ${{ inputs.provenance-repository }}
        PROVENANCE_VERSION: ${{ inputs.provenance-version }}
      run: |
        case "$PROVENANCE_REPOSITORY" in
          ''|*[!A-Za-z0-9._/-]*)
            echo "::error::Invalid provenance-repository input: $PROVENANCE_REPOSITORY"
            exit 1
            ;;
        esac
        case "$PROVENANCE_VERSION" in
          ''|*[!A-Za-z0-9._/-]*)
            echo "::error::Invalid provenance-version input: $PROVENANCE_VERSION"
            exit 1
            ;;
        esac
        case "${RUNNER_OS}:${RUNNER_ARCH}" in
          Linux:X64)
            target="x86_64-unknown-linux-gnu"
            asset_ext="tar.gz"
            binary_name="provenance"
            ;;
          macOS:ARM64)
            target="aarch64-apple-darwin"
            asset_ext="tar.gz"
            binary_name="provenance"
            ;;
          macOS:X64)
            target="x86_64-apple-darwin"
            asset_ext="tar.gz"
            binary_name="provenance"
            ;;
          Windows:X64)
            target="x86_64-pc-windows-msvc"
            asset_ext="zip"
            binary_name="provenance.exe"
            ;;
          *)
            echo "::error::Unsupported runner platform: ${RUNNER_OS}:${RUNNER_ARCH}"
            exit 1
            ;;
        esac

        asset_name="provenance-${PROVENANCE_VERSION}-${target}.${asset_ext}"
        checksums_name="provenance-${PROVENANCE_VERSION}-checksums.txt"
        release_base_url="https://github.com/${PROVENANCE_REPOSITORY}/releases/download/${PROVENANCE_VERSION}"
        asset_path="${RUNNER_TEMP}/${asset_name}"
        checksums_path="${RUNNER_TEMP}/${checksums_name}"
        install_root="${RUNNER_TEMP}/provenance-install"
        install_bin="${RUNNER_TEMP}/provenance-bin"

        curl --fail --silent --show-error --location \
          --output "$asset_path" \
          "${release_base_url}/${asset_name}"
        curl --fail --silent --show-error --location \
          --output "$checksums_path" \
          "${release_base_url}/${checksums_name}"

        expected_checksum="$(
          awk -v asset="$asset_name" '$2 == asset { print $1 }' "$checksums_path"
        )"
        if [ -z "$expected_checksum" ]; then
          echo "::error::Checksum for ${asset_name} not found in ${checksums_name}"
          exit 1
        fi

        if command -v sha256sum >/dev/null 2>&1; then
          actual_checksum="$(sha256sum "$asset_path" | awk '{ print $1 }')"
        else
          actual_checksum="$(shasum -a 256 "$asset_path" | awk '{ print $1 }')"
        fi

        if [ "$actual_checksum" != "$expected_checksum" ]; then
          echo "::error::Checksum mismatch for ${asset_name}"
          exit 1
        fi

        rm -rf "$install_root" "$install_bin"
        mkdir -p "$install_root" "$install_bin"

        if [ "$asset_ext" = "zip" ]; then
          unzip -q "$asset_path" -d "$install_root"
        else
          tar -xzf "$asset_path" -C "$install_root"
        fi

        extracted_binary="$(find "$install_root" -type f -name "$binary_name" | head -n 1)"
        if [ -z "$extracted_binary" ]; then
          echo "::error::Failed to locate ${binary_name} in extracted release archive"
          exit 1
        fi

        cp "$extracted_binary" "$install_bin/$binary_name"
        chmod +x "$install_bin/$binary_name"
        echo "$install_bin" >> "$GITHUB_PATH"

    - name: Check provenance artifacts
      shell: bash
      env:
        INSTALL_SYFT: ${{ inputs.install-syft }}
        PROVENANCE_ROOT: ${{ inputs.root }}
        PROVENANCE_SYFT: ${{ steps.syft.outputs.cmd }}
        SHOW_DIFF_ON_FAILURE: ${{ inputs.show-diff-on-failure }}
      run: |
        export PROVENANCE_CDXGEN="$(command -v cdxgen)"
        if [ "$INSTALL_SYFT" = "true" ]; then
          export PROVENANCE_SYFT
        else
          unset PROVENANCE_SYFT
        fi
        if ! provenance check --root "$PROVENANCE_ROOT"; then
          if [ "$SHOW_DIFF_ON_FAILURE" = "true" ]; then
            echo "::group::provenance diff"
            provenance diff --root "$PROVENANCE_ROOT" || true
            echo "::endgroup::"
          fi
          exit 1
        fi
